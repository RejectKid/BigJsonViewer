name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v6
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Restore
        run: dotnet restore BigJsonViewer.slnx

      - name: Build
        run: dotnet build BigJsonViewer.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test BigJsonViewer.slnx --configuration Release --no-build --logger "console;verbosity=normal"

      - name: Check formatting
        run: dotnet format BigJsonViewer.slnx --no-restore --verify-no-changes

  native-aot-preview:
    name: Native AOT ${{ matrix.rid }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
          - os: macos-latest
            rid: osx-arm64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v6
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Publish Native AOT preview
        run: >-
          dotnet publish src/BigJsonViewer.App/BigJsonViewer.App.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained true
          -p:PublishAot=true
          -p:DebugType=None
          -p:DebugSymbols=false
          --output artifacts/preview/${{ matrix.rid }}

      - name: Upload runnable preview
        uses: actions/upload-artifact@v7
        with:
          name: BigJsonViewer-preview-${{ matrix.rid }}
          path: artifacts/preview/${{ matrix.rid }}
          if-no-files-found: error
          retention-days: 7
